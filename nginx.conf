server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 10M;

    # -----------------------------
    # CRITICAL: prevent port leakage
    # -----------------------------
    port_in_redirect off;
    absolute_redirect off;

    # -----------------------------
    # SPA frontend
    # -----------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -----------------------------
    # Static frontend assets cache
    # -----------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # -----------------------------
    # Common proxy headers
    # -----------------------------
    proxy_http_version 1.1;

    proxy_set_header Host forkit.up.railway.app;
    proxy_set_header X-Forwarded-Host forkit.up.railway.app;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # -----------------------------
    # Backend API (internal network)
    # -----------------------------
    location /api/ {
        proxy_pass http://sweet-empathy.railway.internal:8000;
    }

    # -----------------------------
    # Backend static
    # -----------------------------
    location /static/ {
        proxy_pass http://sweet-empathy.railway.internal:8000/static/;
    }

    # -----------------------------
    # Admin panel
    # -----------------------------
    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        proxy_pass http://sweet-empathy.railway.internal:8000/admin/;

        # rewrite upstream redirects (important)
        proxy_redirect http:// $scheme://;
        proxy_redirect https:// $scheme://;
    }

    # -----------------------------
    # gzip
    # -----------------------------
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        image/svg+xml;
}