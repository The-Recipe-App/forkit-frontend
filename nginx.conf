server {
    listen 8080;
    server_name _;

    client_max_body_size 10M;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        image/svg+xml;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    proxy_http_version 1.1;
    proxy_ssl_server_name on;

    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Connection "";

    location /api/ {
        proxy_pass https://humorous-integrity-production.up.railway.app;
        proxy_set_header Host humorous-integrity-production.up.railway.app;
    }

    location /static/ {
        proxy_pass https://humorous-integrity-production.up.railway.app/static/;
        proxy_set_header Host humorous-integrity-production.up.railway.app;
    }

    location /admin/ {
    proxy_pass https://humorous-integrity-production.up.railway.app/admin/;

    proxy_set_header Host humorous-integrity-production.up.railway.app;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;

    proxy_redirect https://forkit.up.railway.app:8080/ https://forkit.up.railway.app/;
}
}